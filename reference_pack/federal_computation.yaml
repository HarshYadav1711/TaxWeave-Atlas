# Simplified federal line computation for synthetic datasets only.
# All numbers are illustrative; do not use for real filing.

version: 1
lines:
  wages: income.wages
  taxable_interest: income.interest
  ordinary_dividends: income.dividends_ordinary
  federal_withholding: income.federal_withholding

# AGI = sum of included income lines (no adjustments in this synthetic pack)
agi_components:
  - wages
  - taxable_interest
  - ordinary_dividends

deduction:
  type: standard
  source: standard_deduction_by_status

# Taxable income = max(0, agi - standard_deduction)
# Total tax = piecewise linear brackets applied to taxable_income (synthetic)

tax_brackets:
  # (upper_bound_exclusive, marginal_rate) — last bracket upper null means infinity
  - upper: 11600
    rate: 0.10
  - upper: 47150
    rate: 0.12
  - upper: 100525
    rate: 0.22
  - upper: 191950
    rate: 0.24
  - upper: 243725
    rate: 0.32
  - upper: 609350
    rate: 0.35
  - upper: null
    rate: 0.37
