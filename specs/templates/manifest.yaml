# PDF deliverables — filenames are stable and human-readable. Renderers live in taxweave_atlas.pdf.
version: 2
deliverables:
  - id: intake_questionnaire
    renderer: intake_questionnaire
    filename: "01_intake_questionnaire.pdf"
    mapping_document: questionnaire

  - id: supporting_w2
    renderer: supporting_w2
    filename: "02_supporting_form_w2.pdf"
    mapping_document: supporting_w2

  - id: supporting_1099_int
    renderer: supporting_1099_int
    filename: "03_supporting_form_1099_int.pdf"
    mapping_document: supporting_1099_int

  - id: supporting_1099_div
    renderer: supporting_1099_div
    filename: "03b_supporting_form_1099_div.pdf"
    mapping_document: supporting_1099_div
    when: dividends_positive

  - id: federal_return
    renderer: federal_return
    filename: "04_federal_return_summary.pdf"
    mapping_document: federal_summary

  - id: state_return
    renderer: state_return
    filename: "05_state_return_summary.pdf"
    mapping_document: state_summary

  - id: executive_summary
    renderer: executive_summary
    filename: "06_executive_summary.pdf"
    mapping_document: executive_summary
