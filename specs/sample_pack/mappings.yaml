    q_foreign_account: questionnaire.answers.q_foreign_account
    q_crypto: questionnaire.answers.q_crypto
    q_energy_credits: questionnaire.answers.q_energy_credits

  supporting_w2:
    employer_name: income.w2.employer_name
    employer_ein: income.w2.employer_ein
