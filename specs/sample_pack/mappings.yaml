# PDF field labels map to SyntheticTaxCase JSON paths (future renderers).
version: 1
documents:
  questionnaire:
    tax_year: tax_year
    primary_first_name: profile.primary_first_name
    primary_last_name: profile.primary_last_name
    spouse_first_name: profile.spouse_first_name
    spouse_last_name: profile.spouse_last_name
    filing_status: profile.filing_status
    address_line1: profile.address.line1
    city: profile.address.city
