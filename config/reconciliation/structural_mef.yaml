version: 1

# Schedules still absent from synthetic cases (no schema lines / no QBI / no depreciation).
fully_unmodeled_schedules:
  - IRS1040Schedule2
  - IRS8995
  - IRS4562

# Emitted with amounts copied from existing case fields only (see TaxWeaveAtlasCoverage partial note).
schedule_c:
