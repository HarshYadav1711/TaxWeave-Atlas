# Local application profile — no external services.
version: 2

tax_years:
  default: 2023
  active:
    - 2020
    - 2021
    - 2022
    - 2023
    - 2024
    - 2025

states:
  enabled:
    - CA
    - TX
    - NY
    - IL
    - FL

# IDs must match config/generator/complexity.yaml tier keys.
complexity_levels:
  - id: easy
    display_name: Easy
  - id: medium
    display_name: Medium
  - id: moderately_complex
    display_name: Moderately Complex

default_complexity: easy
