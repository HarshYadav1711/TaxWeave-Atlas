# Local application profile — no external services.
version: 1

tax_years:
  default: 2023
  active:
    - 2023

# States enabled for synthetic state packets (extend as rules are added to config/tax_rules/).
states:
  enabled:
    - CA
    - NY
    - TX

# Complexity tiers gate which schedules/forms the generator may attach later.
# Implementation is not wired in the foundation stage.
complexity_levels:
  - id: baseline
    description: "W-2 wages, limited interest/dividends, no schedules modeled."
  - id: intermediate
    description: "Placeholder — define allowed schedules and caps before use."
  - id: advanced
    description: "Placeholder — define stress scenarios and caps before use."

default_complexity: baseline
